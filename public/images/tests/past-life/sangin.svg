<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- glow bg -->
  <circle cx="100" cy="100" r="85" fill="rgba(255,255,255,0.05)"/>
  <!-- balance beam -->
  <rect x="45" y="88" width="110" height="5" rx="2.5" fill="rgba(255,255,255,0.6)"/>
  <!-- center post -->
  <rect x="97" y="88" width="6" height="55" rx="3" fill="rgba(255,255,255,0.55)"/>
  <!-- base -->
  <path d="M78 143 Q100 158 122 143" stroke="rgba(255,255,255,0.6)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <ellipse cx="100" cy="174" rx="26" ry="7" fill="rgba(255,255,255,0.25)"/>
  <!-- left chain -->
  <line x1="58" y1="93" x2="55" y2="115" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-dasharray="3,2"/>
  <!-- right chain -->
  <line x1="142" y1="93" x2="145" y2="115" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-dasharray="3,2"/>
  <!-- left pan -->
  <path d="M40 115 Q55 122 70 115" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- right pan (lower, weighted) -->
  <path d="M130 120 Q145 127 160 120" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- coins left pan -->
  <circle cx="49" cy="113"  r="6" fill="rgba(255,220,0,0.5)"/>
  <circle cx="57" cy="111"  r="6" fill="rgba(255,200,0,0.45)"/>
  <circle cx="65" cy="113"  r="5" fill="rgba(255,220,0,0.4)"/>
  <!-- coins right pan -->
  <circle cx="136" cy="118" r="6" fill="rgba(255,220,0,0.55)"/>
  <circle cx="144" cy="116" r="6" fill="rgba(255,200,0,0.5)"/>
  <circle cx="152" cy="118" r="5" fill="rgba(255,220,0,0.45)"/>
  <circle cx="140" cy="124" r="5" fill="rgba(255,200,0,0.42)"/>
  <!-- coin detail lines -->
  <circle cx="57" cy="111" r="3.5" stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none"/>
  <circle cx="144" cy="116" r="3.5" stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none"/>
  <!-- merchant bag top-left -->
  <path d="M28 52 Q28 36 42 36 Q56 36 56 52 Q56 72 42 76 Q28 72 28 52 Z" fill="rgba(255,255,255,0.45)"/>
  <!-- bag drawstring -->
  <path d="M35 38 Q42 32 49 38" stroke="rgba(255,255,255,0.55)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- bag stitches -->
  <line x1="34" y1="54" x2="50" y2="54" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" stroke-dasharray="3,2"/>
  <!-- coins scattered -->
  <circle cx="155" cy="58"  r="7" fill="rgba(255,220,0,0.5)"/>
  <circle cx="168" cy="52"  r="6" fill="rgba(255,200,0,0.45)"/>
  <circle cx="162" cy="68"  r="5" fill="rgba(255,220,0,0.42)"/>
  <!-- sparkles -->
  <circle cx="90"  cy="38"  r="2.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="170" cy="38"  r="2"   fill="rgba(255,255,255,0.45)"/>
  <circle cx="25"  cy="100" r="1.8" fill="rgba(255,255,255,0.38)"/>
</svg>

  <!-- cherry blossom petals -->
  <!-- petal set 1 -->
  <ellipse cx="58"  cy="72"  rx="7" ry="4" fill="rgba(255,180,200,0.62)" transform="rotate(-30,58,72)"/>
  <ellipse cx="68"  cy="66"  rx="7" ry="4" fill="rgba(255,180,200,0.58)" transform="rotate(20,68,66)"/>
  <ellipse cx="78"  cy="75"  rx="6" ry="3.5" fill="rgba(255,160,190,0.52)" transform="rotate(60,78,75)"/>
  <!-- petal set 2 -->
  <ellipse cx="130" cy="142" rx="7" ry="4" fill="rgba(255,180,200,0.55)" transform="rotate(-45,130,142)"/>
  <ellipse cx="142" cy="136" rx="6" ry="3.5" fill="rgba(255,180,200,0.5)" transform="rotate(15,142,136)"/>
  <ellipse cx="148" cy="148" rx="6" ry="4" fill="rgba(255,160,190,0.48)" transform="rotate(75,148,148)"/>

  <line x1="160" y1="168" x2="68" y2="44" stroke="rgba(255,255,255,0.65)" stroke-width="1.5"/>
  <!-- guard 2 -->
  <path d="M85 62 Q80 56 73 60 Q77 70 85 74 Q88 66 85 62 Z" fill="rgba(255,255,255,0.58)"/>

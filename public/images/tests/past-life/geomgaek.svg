  <!-- edge highlight -->
  <line x1="40" y1="168" x2="132" y2="44" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
  <!-- guard 1 -->
  <path d="M115 62 Q120 56 127 60 Q123 70 115 74 Q112 66 115 62 Z" fill="rgba(255,255,255,0.62)"/>
  <!-- handle 1 -->

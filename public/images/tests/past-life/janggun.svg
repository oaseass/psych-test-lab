  <!-- helmet rivets -->
  <circle cx="80"  cy="88"  r="3" fill="rgba(255,255,255,0.45)"/>
  <circle cx="100" cy="82"  r="3" fill="rgba(255,255,255,0.45)"/>
  <circle cx="120" cy="88"  r="3" fill="rgba(255,255,255,0.45)"/>
  <!-- sword left side -->
  <rect x="26" y="94" width="7" height="46" rx="3" fill="rgba(255,255,255,0.55)" transform="rotate(-22,29,117)"/>
  <!-- sword crossguard -->
  <rect x="15" y="108" width="30" height="6" rx="3" fill="rgba(255,255,255,0.52)" transform="rotate(-22,30,111)"/>

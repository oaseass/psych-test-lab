  <path d="M148 28 L185 44 L148 60 Z" fill="rgba(255,255,255,0.56)"/>
  <!-- flag stripe -->
  <line x1="157" y1="36" x2="178" y2="45" stroke="rgba(255,255,255,0.3)" stroke-width="1.8"/>
  <line x1="157" y1="52" x2="178" y2="45" stroke="rgba(255,255,255,0.3)" stroke-width="1.8"/>

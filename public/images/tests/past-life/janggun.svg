  <!-- cheek guards -->
  <path d="M58 118 L55 138 Q66 148 76 138 L76 125 Z" fill="rgba(255,255,255,0.32)"/>
  <path d="M142 118 L145 138 Q134 148 124 138 L124 125 Z" fill="rgba(255,255,255,0.32)"/>

<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- glow bg -->
  <circle cx="100" cy="100" r="85" fill="rgba(255,255,255,0.05)"/>
  <!-- fan ribs (from pivot at bottom center) -->
  <line x1="100" y1="162" x2="30"  y2="62"  stroke="rgba(255,255,255,0.42)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="100" y1="162" x2="50"  y2="44"  stroke="rgba(255,255,255,0.42)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="100" y1="162" x2="75"  y2="34"  stroke="rgba(255,255,255,0.42)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="100" y1="162" x2="100" y2="30"  stroke="rgba(255,255,255,0.42)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="100" y1="162" x2="125" y2="34"  stroke="rgba(255,255,255,0.42)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="100" y1="162" x2="150" y2="44"  stroke="rgba(255,255,255,0.42)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="100" y1="162" x2="170" y2="62"  stroke="rgba(255,255,255,0.42)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- fan face (semi-circle) -->
  <path d="M30 62 Q32 44 50 36 Q72 26 100 24 Q128 26 150 36 Q168 44 170 62 Q148 56 100 54 Q52 56 30 62 Z"
        fill="rgba(255,255,255,0.5)"/>
  <!-- fan arc border -->
  <path d="M30 62 Q50 30 100 24 Q150 30 170 62" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" fill="none"/>
  <!-- fan painted flowers -->
  <!-- flower 1 left -->
  <circle cx="55" cy="50"  r="8"  fill="rgba(255,180,200,0.5)"/>
  <circle cx="48" cy="44"  r="5"  fill="rgba(255,180,200,0.4)"/>
  <circle cx="55" cy="40"  r="5"  fill="rgba(255,180,200,0.4)"/>
  <circle cx="63" cy="44"  r="5"  fill="rgba(255,180,200,0.4)"/>
  <!-- flower 2 right -->
  <circle cx="145" cy="50" r="8"  fill="rgba(255,180,200,0.5)"/>
  <circle cx="138" cy="44" r="5"  fill="rgba(255,180,200,0.4)"/>
  <circle cx="145" cy="40" r="5"  fill="rgba(255,180,200,0.4)"/>
  <circle cx="153" cy="44" r="5"  fill="rgba(255,180,200,0.4)"/>
  <!-- pivot gem -->
  <circle cx="100" cy="162" r="6" fill="rgba(255,255,255,0.65)"/>
  <!-- dancer silhouette (right side) -->
  <!-- head -->
  <circle cx="148" cy="100" r="10" fill="rgba(255,255,255,0.45)"/>
  <!-- hair bun -->
  <circle cx="150" cy="91"  r="5"  fill="rgba(255,255,255,0.4)"/>
  <!-- body -->
  <path d="M142 110 Q140 130 138 148 Q144 150 148 150 Q152 130 154 110 Z" fill="rgba(255,255,255,0.42)"/>
  <!-- arm raised -->
  <path d="M142 112 Q132 102 128 90 Q132 86 136 90 Q138 100 144 110" fill="rgba(255,255,255,0.38)"/>
  <!-- flowing skirt -->
  <path d="M138 148 Q128 160 120 170 Q130 175 138 168 Q146 160 148 150 Z" fill="rgba(255,255,255,0.38)"/>
  <!-- floating petals -->
  <ellipse cx="30"  cy="128" rx="6" ry="3.5" fill="rgba(255,180,200,0.55)" transform="rotate(30,30,128)"/>
  <ellipse cx="20"  cy="148" rx="5" ry="3"   fill="rgba(255,180,200,0.48)" transform="rotate(-20,20,148)"/>
  <ellipse cx="40"  cy="158" rx="6" ry="3.5" fill="rgba(255,180,200,0.52)" transform="rotate(50,40,158)"/>
  <!-- swirl motion lines -->
  <path d="M16 112 Q24 102 18 92" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M170 158 Q178 148 172 138" stroke="rgba(255,255,255,0.28)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>

<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- glow bg -->
  <circle cx="100" cy="100" r="85" fill="rgba(255,255,255,0.05)"/>
  <!-- mortar bowl -->
  <path d="M52 128 Q52 156 100 160 Q148 156 148 128 Q148 110 100 108 Q52 110 52 128 Z" fill="rgba(255,255,255,0.45)" stroke="rgba(255,255,255,0.38)" stroke-width="1.5"/>
  <!-- mortar lip -->
  <ellipse cx="100" cy="110" rx="48" ry="10" fill="rgba(255,255,255,0.38)"/>
  <!-- contents in mortar -->
  <ellipse cx="100" cy="128" rx="34" ry="8" fill="rgba(255,255,255,0.28)"/>
  <!-- pestle -->
  <rect x="94" y="52" width="12" height="62" rx="6" fill="rgba(255,255,255,0.58)"/>
  <ellipse cx="100" cy="52" rx="8" ry="5" fill="rgba(255,255,255,0.65)"/>
  <!-- medicine jar top-right -->
  <rect x="142" y="46" width="38" height="52" rx="8" fill="rgba(255,255,255,0.5)" stroke="rgba(255,255,255,0.38)" stroke-width="1.2"/>
  <!-- jar lid -->
  <ellipse cx="161" cy="46" rx="19" ry="6" fill="rgba(255,255,255,0.62)"/>
  <!-- jar label/cross -->
  <line x1="161" y1="60" x2="161" y2="82" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="71" x2="172" y2="71" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  <!-- jar band lines -->
  <line x1="144" y1="60" x2="178" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <line x1="144" y1="86" x2="178" y2="86" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <!-- herb bundle left -->
  <!-- stems -->
  <line x1="28" y1="160" x2="52" y2="96"  stroke="rgba(255,255,255,0.55)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38" y1="160" x2="58" y2="100" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="18" y1="158" x2="46" y2="100" stroke="rgba(255,255,255,0.48)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- leaf shapes on herbs -->
  <ellipse cx="52" cy="96"  rx="9" ry="5" fill="rgba(255,255,255,0.52)" transform="rotate(-30,52,96)"/>
  <ellipse cx="58" cy="100" rx="8" ry="4.5" fill="rgba(255,255,255,0.48)" transform="rotate(15,58,100)"/>
  <ellipse cx="46" cy="100" rx="8" ry="4.5" fill="rgba(255,255,255,0.45)" transform="rotate(-50,46,100)"/>
  <!-- smaller leaves mid-stem -->
  <ellipse cx="44" cy="116" rx="7" ry="3.5" fill="rgba(255,255,255,0.38)" transform="rotate(-20,44,116)"/>
  <ellipse cx="50" cy="120" rx="6" ry="3"   fill="rgba(255,255,255,0.35)" transform="rotate(25,50,120)"/>
  <!-- twine tie on herbs -->
  <path d="M24 142 Q38 138 50 142" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- sparkles -->
  <circle cx="100" cy="38"  r="3"   fill="rgba(255,255,255,0.5)"/>
  <circle cx="115" cy="30"  r="2"   fill="rgba(255,255,255,0.42)"/>
  <circle cx="85"  cy="32"  r="1.8" fill="rgba(255,255,255,0.38)"/>
</svg>

<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- glow bg -->
  <circle cx="100" cy="100" r="85" fill="rgba(255,255,255,0.05)"/>
  <!-- mirror frame -->
  <ellipse cx="100" cy="96" rx="56" ry="68" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.55)" stroke-width="4"/>
  <!-- mirror inner frame -->
  <ellipse cx="100" cy="96" rx="48" ry="60" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  <!-- mirror stand -->
  <rect x="88" y="164" width="24" height="12" rx="6" fill="rgba(255,255,255,0.45)"/>
  <rect x="76" y="172" width="48" height="8" rx="4"  fill="rgba(255,255,255,0.4)"/>
  <!-- mirror reflection - light side (top half) -->
  <path d="M68 60 Q100 52 132 60 Q130 80 100 82 Q70 80 68 60 Z" fill="rgba(255,255,255,0.32)"/>
  <!-- mirror reflection - dark shadow/crack side -->
  <path d="M56 100 Q58 120 68 130 Q84 144 100 144 Q80 130 72 112 Q64 96 68 80 Q62 88 56 100 Z" fill="rgba(0,0,0,0.18)"/>
  <!-- crack / dark inner side -->
  <path d="M100 52 L94 74 L106 88 L94 110 L106 132 L100 152" stroke="rgba(0,0,0,0.35)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- crack branches -->
  <path d="M98 80 L84 72" stroke="rgba(0,0,0,0.25)" stroke-width="2" stroke-linecap="round"/>
  <path d="M102 96 L118 86" stroke="rgba(0,0,0,0.22)" stroke-width="2" stroke-linecap="round"/>
  <path d="M96 118 L80 126" stroke="rgba(0,0,0,0.2)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- lightning bolts outside -->
  <path d="M24 56 L30 40 L26 52 L36 36" stroke="rgba(255,220,0,0.65)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M168 60 L162 44 L166 56 L156 40" stroke="rgba(255,220,0,0.6)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- mirror shine -->
  <ellipse cx="80" cy="72" rx="12" ry="6" fill="rgba(255,255,255,0.3)" transform="rotate(-25,80,72)"/>
  <!-- sparkles -->
  <circle cx="162" cy="148" r="3"   fill="rgba(255,255,255,0.48)"/>
  <circle cx="172" cy="138" r="2"   fill="rgba(255,255,255,0.4)"/>
  <circle cx="26"  cy="148" r="2.5" fill="rgba(255,255,255,0.42)"/>
</svg>

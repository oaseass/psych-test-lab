<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- glow bg -->
  <circle cx="100" cy="100" r="85" fill="rgba(255,255,255,0.05)"/>
  <!-- eye white (large sclera) -->
  <path d="M18 100 Q56 50 100 50 Q144 50 182 100 Q144 150 100 150 Q56 150 18 100 Z"
        fill="rgba(255,255,255,0.52)" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
  <!-- iris -->
  <circle cx="100" cy="100" r="36" fill="rgba(255,140,0,0.58)"/>
  <!-- inner iris -->
  <circle cx="100" cy="100" r="28" fill="rgba(255,100,0,0.55)"/>
  <!-- pupil -->
  <circle cx="100" cy="100" r="16" fill="rgba(0,0,0,0.5)"/>
  <!-- eye reflection -->
  <circle cx="90"  cy="90"  r="6" fill="rgba(255,255,255,0.55)"/>
  <circle cx="108" cy="93"  r="3" fill="rgba(255,255,255,0.35)"/>
  <!-- flame top of eye -->
  <path d="M76 54 Q72 38 82 28 Q86 36 84 46 Q94 32 100 20 Q106 32 104 44 Q116 28 122 34 Q126 44 116 54"
        fill="rgba(255,160,0,0.58)" stroke="rgba(255,200,0,0.4)" stroke-width="1"/>
  <!-- inner flame -->
  <path d="M86 54 Q84 42 90 36 Q96 44 94 54" fill="rgba(255,220,0,0.5)"/>
  <path d="M108 54 Q110 42 106 36 Q112 44 112 54" fill="rgba(255,220,0,0.45)"/>
  <!-- flame sparks -->
  <circle cx="70"  cy="38"  r="3"   fill="rgba(255,180,0,0.6)"/>
  <circle cx="130" cy="35"  r="3.5" fill="rgba(255,180,0,0.55)"/>
  <circle cx="60"  cy="52"  r="2"   fill="rgba(255,180,0,0.5)"/>
  <circle cx="140" cy="50"  r="2.5" fill="rgba(255,180,0,0.5)"/>
  <circle cx="100" cy="22"  r="2"   fill="rgba(255,220,0,0.55)"/>
  <!-- eyelashes top -->
  <line x1="60"  cy="65"  x1="60"  y1="65"  x2="52"  y2="54"  stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="78"  y1="54"  x2="74"  y2="44"  stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="120" y1="54"  x2="126" y2="44"  stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="140" y1="65"  x2="148" y2="55"  stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- eyelashes bottom -->
  <line x1="68"  y1="136" x2="62"  y2="148" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <line x1="132" y1="136" x2="138" y2="148" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <!-- fire sparks near eye corners -->
  <circle cx="28"  cy="88"  r="4"   fill="rgba(255,160,0,0.5)"/>
  <circle cx="172" cy="88"  r="4"   fill="rgba(255,160,0,0.5)"/>
  <circle cx="24"  cy="76"  r="2.5" fill="rgba(255,200,0,0.45)"/>
  <circle cx="176" cy="76"  r="2.5" fill="rgba(255,200,0,0.45)"/>
</svg>

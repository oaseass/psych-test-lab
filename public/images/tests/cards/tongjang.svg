<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- glow bg -->
  <circle cx="100" cy="100" r="85" fill="rgba(255,255,255,0.05)"/>
  <!-- passbook body -->
  <rect x="28" y="42" width="144" height="118" rx="8" fill="rgba(255,255,255,0.5)" stroke="rgba(255,255,255,0.42)" stroke-width="2"/>
  <!-- passbook cover strip top -->
  <rect x="28" y="42" width="144" height="24" rx="8" fill="rgba(255,255,255,0.22)"/>
  <!-- passbook title lines -->
  <line x1="42" y1="52"  x2="110" y2="52"  stroke="rgba(255,255,255,0.45)" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="62"  x2="88"  y2="62"  stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-linecap="round"/>
  <!-- passbook data rows -->
  <line x1="38" y1="82"  x2="164" y2="82"  stroke="rgba(255,255,255,0.32)" stroke-width="1.5"/>
  <line x1="38" y1="96"  x2="164" y2="96"  stroke="rgba(255,255,255,0.32)" stroke-width="1.5"/>
  <line x1="38" y1="110" x2="164" y2="110" stroke="rgba(255,255,255,0.32)" stroke-width="1.5"/>
  <line x1="38" y1="124" x2="164" y2="124" stroke="rgba(255,255,255,0.32)" stroke-width="1.5"/>
  <!-- amount numbers implied -->
  <line x1="120" y1="88"  x2="158" y2="88"  stroke="rgba(255,255,255,0.42)" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="102" x2="158" y2="102" stroke="rgba(255,255,255,0.42)" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="116" x2="158" y2="116" stroke="rgba(255,255,255,0.38)" stroke-width="2" stroke-linecap="round"/>
  <!-- HOLES in passbook (coins draining) -->
  <circle cx="76"  cy="90"  r="12" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="76"  cy="90"  r="5"  fill="rgba(0,0,0,0.15)"/>
  <circle cx="106" cy="118" r="10" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.42)" stroke-width="2" stroke-dasharray="3,3"/>
  <circle cx="106" cy="118" r="4"  fill="rgba(0,0,0,0.12)"/>
  <!-- coins falling through holes -->
  <circle cx="72"  cy="140" r="9"  fill="rgba(255,220,60,0.58)"/>
  <circle cx="80"  cy="154" r="8"  fill="rgba(255,200,0,0.52)"/>
  <circle cx="68"  cy="162" r="7"  fill="rgba(255,220,60,0.48)"/>
  <circle cx="100" cy="146" r="8"  fill="rgba(255,200,0,0.5)"/>
  <circle cx="110" cy="160" r="7"  fill="rgba(255,220,60,0.48)"/>
  <!-- coin detail rings -->
  <circle cx="72"  cy="140" r="6"  stroke="rgba(255,255,255,0.38)" stroke-width="1.5" fill="none"/>
  <circle cx="80"  cy="154" r="5"  stroke="rgba(255,255,255,0.35)" stroke-width="1.5" fill="none"/>
  <!-- drain arrows -->
  <path d="M76  132 L76  142 L72  138 M76  142 L80  138" stroke="rgba(255,220,0,0.5)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M106 132 L106 142 L102 138 M106 142 L110 138" stroke="rgba(255,220,0,0.48)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- sparkles -->
  <circle cx="168" cy="46"  r="3"   fill="rgba(255,255,255,0.5)"/>
  <circle cx="178" cy="58"  r="2"   fill="rgba(255,255,255,0.42)"/>
</svg>

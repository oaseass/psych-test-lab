  <path d="M100 168 Q56 140 38 108 Q24 80 40 60 Q56 40 78 50 Q90 56 100 68"
        fill="rgba(255,255,255,0.55)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>

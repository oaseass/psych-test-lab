  <line x1="38" y1="32" x2="38" y2="38" stroke="rgba(255,220,0,0.65)" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="38" cy="41" r="1.2" fill="rgba(255,220,0,0.65)"/>
  <path d="M158 38 L168 20 L178 38 Z" stroke="rgba(255,220,0,0.55)" stroke-width="2" fill="rgba(255,220,0,0.18)"/>
  <line x1="168" y1="26" x2="168" y2="32" stroke="rgba(255,220,0,0.6)" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="168" cy="35" r="1.2" fill="rgba(255,220,0,0.6)"/>
  <!-- small hearts floating -->
  <path d="M24 90 Q24 84 30 84 Q36 84 36 90 Q36 96 30 100 Q24 96 24 90 Z" fill="rgba(255,255,255,0.3)"/>
  <path d="M164 86 Q164 80 170 80 Q176 80 176 86 Q176 92 170 96 Q164 92 164 86 Z" fill="rgba(255,255,255,0.28)"/>

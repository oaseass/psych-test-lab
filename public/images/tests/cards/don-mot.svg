<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- glow bg -->
  <circle cx="100" cy="100" r="85" fill="rgba(255,255,255,0.05)"/>
  <!-- wallet body -->
  <rect x="22" y="62" width="120" height="88" rx="10" fill="rgba(255,255,255,0.52)" stroke="rgba(255,255,255,0.42)" stroke-width="2"/>
  <!-- wallet flap top -->
  <path d="M22 82 Q22 62 32 62 L132 62 Q142 62 142 82" fill="rgba(255,255,255,0.38)"/>
  <!-- wallet clasp -->
  <circle cx="82" cy="62" r="6" fill="rgba(255,220,80,0.65)"/>
  <!-- card slots -->
  <rect x="32" y="90" width="44" height="14" rx="3" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <rect x="32" y="112" width="44" height="14" rx="3" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <!-- holes in wallet (money leaking) -->
  <circle cx="90" cy="108" r="10" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="112" cy="126" r="8" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.42)" stroke-width="2" stroke-dasharray="3,3"/>
  <!-- coins raining down/out right side -->
  <circle cx="154" cy="84"  r="10" fill="rgba(255,220,60,0.6)"/>
  <circle cx="154" cy="84"  r="7"  stroke="rgba(255,255,255,0.35)" stroke-width="1.5" fill="none"/>
  <circle cx="168" cy="102" r="9"  fill="rgba(255,200,0,0.55)"/>
  <circle cx="168" cy="102" r="6"  stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none"/>
  <circle cx="158" cy="122" r="8"  fill="rgba(255,220,60,0.52)"/>
  <circle cx="170" cy="140" r="7"  fill="rgba(255,200,0,0.5)"/>
  <circle cx="152" cy="148" r="6"  fill="rgba(255,220,60,0.48)"/>
  <!-- falling coin motion lines -->
  <line x1="162" y1="72"  x2="160" y2="64"  stroke="rgba(255,220,0,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="158" y1="74"  x2="154" y2="66"  stroke="rgba(255,220,0,0.45)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- down arrows (coins falling) -->
  <path d="M156 158 L156 170 L152 166 M156 170 L160 166" stroke="rgba(255,220,0,0.5)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- small sparkles -->
  <circle cx="32"  cy="46"  r="2.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="20"  cy="100" r="2"   fill="rgba(255,255,255,0.42)"/>
</svg>

<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- glow bg -->
  <circle cx="100" cy="100" r="85" fill="rgba(255,255,255,0.05)"/>
  <!-- magnet U-shape -->
  <path d="M44 152 L44 78 Q44 44 100 44 Q156 44 156 78 L156 152"
        stroke="rgba(255,255,255,0.62)" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- magnet pole caps -->
  <rect x="36" y="144" width="22" height="18" rx="4" fill="rgba(255,120,120,0.6)"/>
  <rect x="142" y="144" width="22" height="18" rx="4" fill="rgba(120,180,255,0.6)"/>
  <!-- magnet label N/S implied by colors -->
  <!-- attracted hearts orbiting -->
  <path d="M18 90 Q18 78 28 78 Q38 78 38 90 Q38 102 28 110 Q18 102 18 90 Z" fill="rgba(255,255,255,0.58)"/>
  <path d="M22 54 Q22 46 28 46 Q34 46 34 54 Q34 62 28 67 Q22 62 22 54 Z" fill="rgba(255,255,255,0.48)"/>
  <path d="M162 88 Q162 76 172 76 Q182 76 182 88 Q182 100 172 108 Q162 100 162 88 Z" fill="rgba(255,255,255,0.55)"/>
  <path d="M164 50 Q164 42 170 42 Q176 42 176 50 Q176 58 170 63 Q164 58 164 50 Z" fill="rgba(255,255,255,0.45)"/>
  <!-- attraction arrows pointing to magnet -->
  <path d="M40 90 L52 90" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M50 84 L58 90 L50 96" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <path d="M160 88 L148 88" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M150 82 L142 88 L150 94" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <!-- sparkle stars -->
  <circle cx="100" cy="24"  r="3"   fill="rgba(255,255,255,0.55)"/>
  <circle cx="88"  cy="16"  r="2"   fill="rgba(255,255,255,0.45)"/>
  <circle cx="112" cy="18"  r="2.2" fill="rgba(255,255,255,0.5)"/>
  <!-- 4-pt star -->
  <path d="M54 32 L56 24 L58 32 L66 34 L58 36 L56 44 L54 36 L46 34 Z" fill="rgba(255,255,255,0.45)"/>
  <path d="M140 28 L142 20 L144 28 L152 30 L144 32 L142 40 L140 32 L132 30 Z" fill="rgba(255,255,255,0.42)"/>
</svg>

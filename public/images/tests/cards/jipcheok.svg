<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- glow bg -->
  <circle cx="100" cy="100" r="85" fill="rgba(255,255,255,0.05)"/>
  <!-- button outer ring (shadow) -->
  <circle cx="100" cy="102" r="60" fill="rgba(0,0,0,0.15)"/>
  <!-- button base disc -->
  <circle cx="100" cy="98"  r="60" fill="rgba(220,40,40,0.55)"/>
  <!-- button inner beveled top -->
  <circle cx="100" cy="94"  r="52" fill="rgba(255,70,70,0.5)"/>
  <!-- button face -->
  <circle cx="100" cy="90"  r="46" fill="rgba(255,90,90,0.52)"/>
  <!-- button sheen highlight -->
  <ellipse cx="82" cy="72" rx="18" ry="10" fill="rgba(255,255,255,0.28)" transform="rotate(-20,82,72)"/>
  <!-- button label text shape - "PUSH" implied by stripes -->
  <line x1="78" y1="88"  x2="122" y2="88"  stroke="rgba(255,255,255,0.45)" stroke-width="3" stroke-linecap="round"/>
  <line x1="82" y1="96"  x2="118" y2="96"  stroke="rgba(255,255,255,0.38)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- chains left -->
  <path d="M22 62 Q28 56 34 62 Q40 68 34 74 Q28 80 22 74 Q16 68 22 62 Z" stroke="rgba(255,255,255,0.55)" stroke-width="2.5" fill="none"/>
  <path d="M22 74 Q16 80 22 86 Q28 92 34 86 Q40 80 34 74" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" fill="none"/>
  <line x1="40" y1="68"  x2="52" y2="72" stroke="rgba(255,255,255,0.42)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- chains right -->
  <path d="M166 62 Q172 56 178 62 Q184 68 178 74 Q172 80 166 74 Q160 68 166 62 Z" stroke="rgba(255,255,255,0.52)" stroke-width="2.5" fill="none"/>
  <path d="M166 74 Q160 80 166 86 Q172 92 178 86 Q184 80 178 74" stroke="rgba(255,255,255,0.48)" stroke-width="2.5" fill="none"/>
  <line x1="160" y1="68" x2="148" y2="72" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- lock -->
  <rect x="84" y="148" width="32" height="28" rx="5" fill="rgba(255,255,255,0.5)"/>
  <path d="M90 148 Q90 136 100 136 Q110 136 110 148" stroke="rgba(255,255,255,0.55)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="100" cy="161" r="5" fill="rgba(255,70,70,0.5)"/>
  <line x1="100" y1="161" x2="100" y2="168" stroke="rgba(255,255,255,0.45)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- pressure lines around button -->
  <path d="M38 32 Q44 28 48 34" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M152 30 Q158 26 162 32" stroke="rgba(255,255,255,0.38)" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
